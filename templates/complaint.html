<!DOCTYPE html>
<html>
<head>
    <title>Sahara Portal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">237 Engr Regt Women Sahara Portal</div>

<div class="container">

    <p class="subtitle">Welfare & grievance redressal platform for unit families</p>

    <div class="note">
        All submissions can be made anonymously and will be handled with strict confidentiality.
    </div>

    <!-- 🔊 ALERT SOUND -->
    <audio id="alertSound" src="/static/alert.mp3"></audio>

    <!-- 🔥 FORM START -->
    <form id="complaintForm">

    <!-- BASIC DETAILS -->
    <div class="card">
        <h3>Basic Details</h3>

        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="wo" placeholder="Husband Rank & Name">
        <input type="text" name="contact" placeholder="Contact Number" required>
        <input type="text" name="address" placeholder="Address">

        <input type="email" name="email" placeholder="Email">
        <input type="text" name="unit" placeholder="Unit">
        <input type="text" name="quarter" placeholder="Quarter">
    </div>

    <!-- CATEGORY -->
    <div class="card">
        <h3>Select Category</h3>

        <!-- 🔥 CATEGORY SELECT -->
        <select id="category" name="category" onchange="updateSubcategory()" required>
            <option value="">Select Category</option>
            <option value="ration">Ration</option>
            <option value="accommodation">Accommodation</option>
            <option value="welfare">Welfare</option>
            <option value="safety">Safety</option>
        </select>

        <!-- 🔥 SUBCATEGORY -->
        <select id="subcategory" name="subcategory" required>
            <option value="">Select Issue</option>
        </select>
    </div>

    <!-- DESCRIPTION -->
    <div class="card">
        <h3>Describe Your Concern</h3>

        <textarea name="complaint" placeholder="Write your issue here..." required></textarea>

        <button type="button" class="record">🎤 Record</button>
        <button type="button" class="stop">⏹ Stop</button>

        <audio controls></audio>
    </div>

    <button type="button" class="emergency">🚨 Emergency</button>

    <!-- ✅ SUBMIT -->
    <button type="submit" class="submit">Submit</button>

    </form>
    <!-- 🔥 FORM END -->

</div>

<!-- 🔥 JS START -->
<script>

// ✅ CATEGORY → SUBCATEGORY LOGIC
function updateSubcategory() {
    let category = document.getElementById("category").value;
    let subcategory = document.getElementById("subcategory");

    let options = {
        ration: [
            "Non-availability of ration",
            "Poor quality",
            "Delayed supply",
            "CSD issue"
        ],
        accommodation: [
            "Water supply",
            "Electricity",
            "Repairs",
            "Sanitation issue"
        ],
        welfare: [
            "Family issues",
            "Financial stress",
            "Counselling request",
            "Children education"
        ],
        safety: [
            "Harassment",
            "Security safety",
            "Domestic safety",
            "Neighbour disputes"
        ]
    };

    subcategory.innerHTML = "<option value=''>Select Issue</option>";

    if (category in options) {
        options[category].forEach(function(item) {
            let opt = document.createElement("option");
            opt.value = item;
            opt.text = item;
            subcategory.appendChild(opt);
        });
    }
}


// ✅ FORM SUBMIT
document.getElementById("complaintForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let formData = new FormData(this);

    fetch("/complaint", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("alertSound").play();

        alert("✅ Complaint Submitted!\nYour ID: " + data.id);

        document.getElementById("complaintForm").reset();

        // 🔥 RESET SUBCATEGORY ALSO
        document.getElementById("subcategory").innerHTML = "<option value=''>Select Issue</option>";
    })
    .catch(error => {
        alert("❌ Error submitting complaint");
        console.error(error);
    });
});

</script>
<!-- 🔥 JS END -->

</body>
</html>
