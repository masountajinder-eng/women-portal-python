<!DOCTYPE html>
<html>
<head>
    <title>Sahara Portal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">237 Engr Regt Women Sahara Portal</div>

<div class="container">

    <p class="subtitle">Welfare & grievance redressal platform for unit families</p>

    <div class="note">
        All submissions can be made anonymously and will be handled with strict confidentiality.
    </div>

    <!-- 🔊 ALERT SOUND -->
    <audio id="alertSound" src="/static/alert.mp3"></audio>

    <!-- 🔥 FORM START -->
    <form id="complaintForm">

    <!-- BASIC DETAILS -->
    <div class="card">
        <h3>Basic Details</h3>

        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="wo" placeholder="Husband Rank & Name">
        <input type="text" name="contact" placeholder="Contact Number" required>
        <input type="text" name="address" placeholder="Address">

        <input type="email" name="email" placeholder="Email">
        <input type="text" name="unit" placeholder="Unit">
        <input type="text" name="quarter" placeholder="Quarter">
    </div>

    <!-- CATEGORY -->
    <div class="card">
        <h3>Select Category</h3>

        <div class="grid">
            <div class="box">🍽️<br>Ration</div>
            <div class="box">🏠<br>Accommodation</div>
            <div class="box">👨‍👩‍👧<br>Welfare</div>
            <div class="box">🛡️<br>Safety</div>
        </div>
    </div>

    <!-- DESCRIPTION -->
    <div class="card">
        <h3>Describe Your Concern</h3>

        <textarea name="complaint" placeholder="Write your issue here..." required></textarea>

        <button type="button" class="record">🎤 Record</button>
        <button type="button" class="stop">⏹ Stop</button>

        <audio controls></audio>
    </div>

    <button type="button" class="emergency">🚨 Emergency</button>

    <!-- ✅ SUBMIT -->
    <button type="submit" class="submit">Submit</button>

    </form>
    <!-- 🔥 FORM END -->

</div>

<!-- 🔥 JS FIX (MOST IMPORTANT) -->
<script>
document.getElementById("complaintForm").addEventListener("submit", function(e) {
    e.preventDefault(); // page reload रोकता है

    let formData = new FormData(this);

    fetch("/complaint", {
        method: "POST",
        body: formData
    })
    .then(response => response.text())
    .then(data => {
        // 🔊 SOUND PLAY
        document.getElementById("alertSound").play();

        // ✅ SUCCESS MESSAGE
        alert("✅ Complaint Submitted Successfully!");

        // form reset
        document.getElementById("complaintForm").reset();
    })
    .catch(error => {
        alert("❌ Error submitting complaint");
        console.error(error);
    });
});
</script>

</body>
</html>
