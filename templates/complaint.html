<!DOCTYPE html>
<html>
<head>
    <title>Sahara Portal</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="navbar">237 Engr Regt Women Sahara Portal</div>

<div class="container">

    <p class="subtitle">Welfare & grievance redressal platform for unit families</p>

    <div class="note">
        All submissions can be made anonymously and will be handled with strict confidentiality.
    </div>

    <audio id="alertSound" src="/static/alert.mp3"></audio>

    <form id="complaintForm">

    <!-- BASIC DETAILS -->
    <div class="card">
        <h3>Basic Details</h3>

        <input type="text" name="name" placeholder="Name" required>
        <input type="text" name="wo" placeholder="Husband Rank & Name">
        <input type="text" name="contact" placeholder="Contact Number" required>
        <input type="text" name="address" placeholder="Address">

        <input type="email" name="email" placeholder="Email">
        <input type="text" name="unit" placeholder="Unit">
        <input type="text" name="quarter" placeholder="Quarter">
    </div>

    <!-- CATEGORY -->
    <div class="card">
        <h3>Select Category</h3>

        <div class="grid">
            <div class="box" onclick="selectCategory(event,'ration')">🍽️<br>Ration</div>
            <div class="box" onclick="selectCategory(event,'accommodation')">🏠<br>Accommodation</div>
            <div class="box" onclick="selectCategory(event,'welfare')">👨‍👩‍👧<br>Welfare</div>
            <div class="box" onclick="selectCategory(event,'safety')">🛡️<br>Safety</div>
        </div>

        <input type="hidden" name="category" id="category">
        <input type="hidden" name="subcategory" id="subcategory">

        <div id="subcategoryBox" class="subcategory-box"></div>
    </div>

    <!-- DESCRIPTION -->
    <div class="card">
        <h3>Describe Your Concern</h3>

        <textarea name="complaint" placeholder="Write your issue here..." required></textarea>

        <button type="button" class="record">🎤 Record</button>
        <button type="button" class="stop">⏹ Stop</button>

        <audio controls></audio>
    </div>

    <button type="button" class="emergency">🚨 Emergency</button>

    <button type="submit" class="submit">Submit</button>

    </form>

</div>

<script>

let options = {
    ration: ["Non-availability of ration","Poor quality","Delayed supply","CSD issue"],
    accommodation: ["Water supply","Electricity","Repairs","Sanitation issue"],
    welfare: ["Family issues","Financial stress","Counselling request","Children education"],
    safety: ["Harassment","Security safety","Domestic safety","Neighbour disputes"]
};

function selectCategory(e, cat) {
    document.getElementById("category").value = cat;

    document.querySelectorAll(".box").forEach(el => el.classList.remove("active"));
    e.currentTarget.classList.add("active");

    let box = document.getElementById("subcategoryBox");
    box.innerHTML = "";

    options[cat].forEach(item => {
        let div = document.createElement("div");
        div.className = "sub-option";
        div.innerText = item;

        div.onclick = function () {
            document.querySelectorAll(".sub-option").forEach(el => el.classList.remove("active"));
            div.classList.add("active");
            document.getElementById("subcategory").value = item;
        };

        box.appendChild(div);
    });
}

// 🔥 FINAL SUBMIT FIX
document.getElementById("complaintForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let category = document.getElementById("category").value;
    let subcategory = document.getElementById("subcategory").value;

    // ✅ validation
    if(!category){
        alert("⚠️ Please select a category");
        return;
    }

    if(!subcategory){
        alert("⚠️ Please select a subcategory");
        return;
    }

    let formData = new FormData(this);

    fetch("/complaint", {
        method: "POST",
        body: formData
    })
    .then(async response => {
        let data;

        try {
            data = await response.json();
        } catch {
            throw new Error("Invalid JSON response");
        }

        console.log("🔥 SERVER RESPONSE:", data);

        // ✅ SUCCESS CASE
        if(data.status === "success" && data.id){
            document.getElementById("alertSound").play();

            alert("✅ Complaint Submitted!\nYour ID: " + data.id);

            // reset form
            document.getElementById("complaintForm").reset();
            document.getElementById("subcategoryBox").innerHTML = "";
            document.querySelectorAll(".box").forEach(el => el.classList.remove("active"));
        } 
        // ❌ ERROR CASE
        else {
            alert("❌ " + (data.message || "Unknown error"));
        }
    })
    .catch(error => {
        alert("❌ Server Error - check console");
        console.error("ERROR:", error);
    });
});

</script>

</body>
</html>
