<!DOCTYPE html>
<html>
<head>
    <title>View Data</title>
</head>
<body style="font-family: Arial; text-align:center;">

<h2>Saved Data</h2>

<table border="1" align="center">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Mobile</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
</tr>
{% endfor %}

</table>

<br><br>
<a href="/">Back</a>

</body>
</html>
