<!DOCTYPE html>
<html>
<head>
    <title>All Complaints</title>
</head>
<body>

<h2>All Complaints</h2>

<table border="1">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Mobile</th>
    <th>Unit</th>
    <th>Address</th>
    <th>Complaint</th>
    <th>Email</th>
    <th>Action</th>
</tr>

{% for row in data %}
<tr>
    <td>{{ row.id }}</td>
    <td>{{ row.name }}</td>
    <td>{{ row.mobile }}</td>
    <td>{{ row.unit }}</td>
    <td>{{ row.address }}</td>
    <td>{{ row.complaint }}</td>
    <td>{{ row.email }}</td>
    <td><a href="/delete/{{ row.id }}">Delete</a></td>
</tr>
{% endfor %}

</table>

<br>
<a href="/">Back to Home</a>

</body>
</html>
