<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="navbar">Admin Panel</div>

<div class="container">
<div class="card">

<table border="1" width="100%" cellpadding="10">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Complaint</th>
    <th>Category</th>
    <th>Subcategory</th>
    <th>Audio</th>
    <th>Reply</th>
    <th>Action</th> <!-- 🆕 DELETE COLUMN -->
</tr>

{% for row in data %}
<tr id="row_{{row[1]}}">
    <td>{{row[1]}}</td>
    <td>{{row[2]}}</td>
    <td>{{row[9]}}</td>
    <td>{{row[10]}}</td>
    <td>{{row[11]}}</td>

    <!-- 🎧 AUDIO -->
    <td>
        {% if row[13] %}
            <audio controls style="width:150px;">
                <source src="{{row[13]}}" type="audio/webm">
            </audio>
        {% else %}
            No Audio
        {% endif %}
    </td>

    <!-- 💬 REPLY -->
    <td>
        <input id="reply_{{row[1]}}" placeholder="Type reply">

        <button onclick="sendReply('{{row[1]}}')">Send</button>

        <p style="color:green;">{{row[12]}}</p>
    </td>

    <!-- 🗑️ DELETE -->
    <td>
        <button onclick="deleteComplaint('{{row[1]}}')" 
        style="background:red;color:white;">
            Delete
        </button>
    </td>

</tr>
{% endfor %}

</table>

</div>
</div>

<!-- 🔊 SOUND -->
<audio id="alertSound" src="/static/alert.mp3"></audio>

<script>

// 💬 SEND REPLY
function sendReply(id){
    let reply = document.getElementById("reply_" + id).value;

    if(!reply){
        alert("Enter reply first");
        return;
    }

    fetch("/reply/" + id, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "reply=" + encodeURIComponent(reply)
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            alert("✅ Reply Sent");
            location.reload();
        } else {
            alert("❌ Error sending reply");
        }
    });
}


// 🗑️ DELETE FUNCTION
function deleteComplaint(id){

    if(!confirm("Are you sure delete karna hai?")) return;

    fetch("/delete/" + id, {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            
            // 🔥 bina reload ke row remove
            document.getElementById("row_" + id).remove();

        } else {
            alert("❌ Delete failed");
        }
    });
}


// 🔔 AUTO ALERT
let lastCount = {{ data|length }};

setInterval(() => {
    fetch('/check')
    .then(res => res.json())
    .then(res => {

        if (res.count > lastCount) {
            document.getElementById("alertSound").play();

            setTimeout(() => {
                location.reload();
            }, 1000);
        }

    });
}, 5000);

</script>

</body>
</html>
