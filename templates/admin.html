<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="navbar">Admin Panel</div>

<div class="container">
<div class="card">

<!-- 🔥 TOP ACTION BAR -->
<div style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
    <h3>All Complaints</h3>

    <div style="display:flex; gap:10px;">

        <!-- 📊 GOOGLE SHEET BUTTON -->
        <a href="https://docs.google.com/spreadsheets/d/1BpKytukjZUP1PVdXx6tuSgV_e2xvrl3b95nDaspjf0Y/edit?gid=0#gid=0" target="_blank">
            <button style="padding:10px 15px; background:#2563eb; color:white; border:none;">
                📊 Open Sheet
            </button>
        </a>

        <!-- 📥 DOWNLOAD -->
        <a href="/download_excel">
            <button style="padding:10px 15px; background:green; color:white; border:none;">
                📥 Download Excel
            </button>
        </a>

        <!-- 🏠 HOME -->
        <a href="/">
            <button style="padding:10px 15px; background:black; color:white; border:none;">
                🚪 Home
            </button>
        </a>

    </div>
</div>

<table border="1" width="100%" cellpadding="10">
<tr>
    <th>Complaint ID</th>
    <th>Name</th>
    <th>Contact</th>
    <th>Complaint</th>
    <th>Category</th>
    <th>Subcategory</th>
    <th>Date</th>
</tr>

<!-- 🔥 GOOGLE SHEET DATA -->
{% for row in data[1:] %}
<tr>

    <td>{{row[0]}}</td> <!-- Complaint ID -->
    <td>{{row[1]}}</td> <!-- Name -->
    <td>{{row[2]}}</td> <!-- Contact -->
    <td>{{row[3]}}</td> <!-- Complaint -->
    <td>{{row[4]}}</td> <!-- Category -->
    <td>{{row[5]}}</td> <!-- Subcategory -->
    <td>{{row[6]}}</td> <!-- Date -->

</tr>
{% endfor %}

</table>

</div>
</div>

<!-- 🔊 SOUND -->
<audio id="alertSound" src="/static/alert.mp3"></audio>

<script>

// 🔥 AUTO REFRESH EVERY 5 SEC
setInterval(() => {
    location.reload();
}, 5000);

</script>

</body>
</html>
