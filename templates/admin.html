<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="navbar">Admin Panel</div>

<div class="container">
<div class="card">

<!-- 🔥 TOP ACTION BAR -->
<div style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
    <h3>All Complaints</h3>

    <div>
        <a href="/download">
            <button style="padding:10px 15px; background:green; color:white; border:none;">
                📥 Download Excel
            </button>
        </a>

        <a href="/logout">
            <button style="padding:10px 15px; background:black; color:white; border:none;">
                🚪 Logout
            </button>
        </a>
    </div>
</div>

<table border="1" width="100%" cellpadding="10">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Complaint</th>
    <th>Category</th>
    <th>Subcategory</th>
    <th>Audio</th>
    <th>Reply</th>
    <th>Action</th>
</tr>

{% for row in data %}
<tr id="row_{{row.complaint_id}}">

    <td>{{row.complaint_id}}</td>
    <td>{{row.name}}</td>
    <td>{{row.complaint}}</td>
    <td>{{row.category}}</td>
    <td>{{row.subcategory}}</td>

    <!-- 🎧 AUDIO -->
    <td>
        {% if row.audio %}
            <audio controls style="width:150px;">
                <source src="{{row.audio}}" type="audio/webm">
            </audio>
        {% else %}
            <span style="color:gray;">No Audio</span>
        {% endif %}
    </td>

    <!-- 💬 REPLY -->
    <td>
        <input id="reply_{{row.complaint_id}}" placeholder="Type reply" style="width:120px;">

        <button onclick="sendReply('{{row.complaint_id}}')" 
        style="background:blue;color:white;">
            Send
        </button>

        <p style="color:green; margin-top:5px;">
            {{row.reply}}
        </p>
    </td>

    <!-- 🗑️ DELETE -->
    <td>
        <button onclick="deleteComplaint('{{row.complaint_id}}')" 
        style="background:red;color:white;">
            Delete
        </button>
    </td>

</tr>
{% endfor %}

</table>

</div>
</div>

<!-- 🔊 SOUND -->
<audio id="alertSound" src="/static/alert.mp3"></audio>

<script>

// 💬 SEND REPLY
function sendReply(id){
    let reply = document.getElementById("reply_" + id).value;

    if(!reply){
        alert("Enter reply first");
        return;
    }

    fetch("/reply/" + id, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "reply=" + encodeURIComponent(reply)
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            alert("✅ Reply Sent");
            location.reload();
        } else {
            alert("❌ Error sending reply");
        }
    });
}

// 🗑️ DELETE FUNCTION
function deleteComplaint(id){

    if(!confirm("Delete karna hai?")) return;

    fetch("/delete/" + id, {
        method: "POST"
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            document.getElementById("row_" + id).remove();
        } else {
            alert("❌ Delete failed");
        }
    });
}

</script>

</body>
</html>
