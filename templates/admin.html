<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        .top-bar {
            display:flex;
            justify-content:center;
            gap:15px;
            margin-bottom:20px;
        }

        .btn {
            padding:10px 18px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:14px;
        }

        .sheet { background:#2563eb; color:white; }
        .home { background:black; color:white; }

        .item {
            border-bottom:1px solid #ddd;
            padding:15px 0;
        }

        input {
            padding:8px;
            margin-top:8px;
            width:200px;
        }

        button.send {
            background:green;
            color:white;
            padding:8px 12px;
            margin-left:10px;
            border:none;
            border-radius:5px;
        }
    </style>
</head>

<body>

<div class="navbar">Admin Panel</div>

<div class="container">
<div class="card">

<!-- 🔝 TOP BUTTONS -->
<div class="top-bar">

    <a href="https://docs.google.com/spreadsheets/d/1BpKytukjZUP1PVdXx6tuSgV_e2xvrl3b95nDaspjf0Y/edit?gid=0#gid=0" target="_blank">
        <button class="btn sheet">📊 Open Sheet</button>
    </a>

    <a href="/">
        <button class="btn home">🏠 Home</button>
    </a>

</div>

<h3 style="text-align:center;">All Complaints</h3>

<!-- 🔥 DATA LOOP -->
{% for row in data[1:] %}
<div class="item">

    <p><b>Complaint ID:</b> {{row[0]}}</p>
    <p><b>Name:</b> {{row[1]}}</p>
    <p><b>Contact:</b> {{row[2]}}</p>
    <p><b>Complaint:</b> {{row[3]}}</p>
    <p><b>Category:</b> {{row[4]}}</p>
    <p><b>Subcategory:</b> {{row[5]}}</p>
    <p><b>Date:</b> {{row[6]}}</p>

    <!-- 💬 REPLY -->
    <input id="reply_{{row[0]}}" placeholder="Type reply">

    <button class="send" onclick="sendReply('{{row[0]}}')">
        Send
    </button>

    <!-- Existing reply -->
    <p style="color:green;">
        {{row[7] if row|length > 7 else ""}}
    </p>

</div>
{% endfor %}

</div>
</div>

<script>

// 💬 SEND REPLY
function sendReply(id){
    let reply = document.getElementById("reply_" + id).value;

    if(!reply){
        alert("Enter reply first");
        return;
    }

    fetch("/reply/" + id, {
        method:"POST",
        headers:{
            "Content-Type":"application/x-www-form-urlencoded"
        },
        body:"reply=" + encodeURIComponent(reply)
    })
    .then(res=>res.text())
    .then(()=>{
        alert("✅ Reply Sent");
        location.reload();
    });
}

// 🔄 AUTO REFRESH
setInterval(() => {
    location.reload();
}, 5000);

</script>

</body>
</html>
