<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="navbar">Admin Panel</div>

<div class="container">
<div class="card">

<table border="1" width="100%" cellpadding="10">
<tr>
    <th>ID</th>
    <th>Name</th>
    <th>Complaint</th>
    <th>Category</th>
    <th>Subcategory</th>
    <th>Reply</th>
</tr>

{% for row in data %}
<tr>
    <td>{{row[1]}}</td> <!-- complaint_id -->
    <td>{{row[2]}}</td> <!-- name -->
    <td>{{row[9]}}</td> <!-- complaint -->
    <td>{{row[10]}}</td> <!-- category -->
    <td>{{row[11]}}</td> <!-- subcategory -->

    <td>
        <!-- Reply input -->
        <input id="reply_{{row[1]}}" placeholder="Type reply">

        <!-- Send button -->
        <button onclick="sendReply('{{row[1]}}')">Send</button>

        <!-- Show saved reply -->
        <p style="color:green;">{{row[12]}}</p>
    </td>
</tr>
{% endfor %}

</table>

</div>
</div>

<!-- 🔊 SOUND -->
<audio id="alertSound" src="/static/alert.mp3"></audio>

<script>

// 🔥 SEND REPLY (NO PAGE REDIRECT)
function sendReply(id){
    let reply = document.getElementById("reply_" + id).value;

    if(!reply){
        alert("Enter reply first");
        return;
    }

    fetch("/reply/" + id, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "reply=" + encodeURIComponent(reply)
    })
    .then(res => res.json())
    .then(data => {
        if(data.status === "success"){
            alert("✅ Reply Sent");
            location.reload();
        } else {
            alert("❌ Error sending reply");
        }
    });
}


// 🔊 AUTO NEW COMPLAINT ALERT
let lastCount = {{ data|length }};

setInterval(() => {
    fetch('/check')
    .then(res => res.json())
    .then(res => {

        if (res.count > lastCount) {
            console.log("New complaint आया!");

            document.getElementById("alertSound").play();

            setTimeout(() => {
                location.reload();
            }, 1000);
        }

    });
}, 5000);

</script>

</body>
</html>
