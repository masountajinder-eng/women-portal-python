<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="/static/style.css">
</head>

<body>

<div class="navbar">Admin Panel</div>

<div class="container">
<div class="card">

<!-- 🔥 TOP ACTION BAR -->
<div style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
    <h3>All Complaints</h3>

    <div>
        <a href="/download_excel">
            <button style="padding:10px 15px; background:green; color:white; border:none;">
                📥 Download Excel
            </button>
        </a>

        <a href="/">
            <button style="padding:10px 15px; background:black; color:white; border:none;">
                🚪 Home
            </button>
        </a>
    </div>
</div>

<table border="1" width="100%" cellpadding="10">
<tr>
    <th>ID</th>
    <th>Complaint ID</th>
    <th>Name</th>
    <th>Complaint</th>
    <th>Category</th>
    <th>Subcategory</th>
    <th>Audio</th>
    <th>Reply</th>
    <th>Action</th>
</tr>

<!-- ⚠️ IMPORTANT: data[1:] -->
{% for row in data[1:] %}
<tr id="row_{{row[1]}}">

    <td>{{row[0]}}</td>
    <td>{{row[1]}}</td>
    <td>{{row[2]}}</td>
    <td>{{row[9]}}</td>
    <td>{{row[10]}}</td>
    <td>{{row[11]}}</td>

    <!-- 🎧 AUDIO -->
    <td>
        {% if row[13] %}
            <audio controls style="width:150px;">
                <source src="{{row[13]}}" type="audio/webm">
            </audio>
        {% else %}
            <span style="color:gray;">No Audio</span>
        {% endif %}
    </td>

    <!-- 💬 REPLY -->
    <td>
        <input id="reply_{{row[1]}}" placeholder="Type reply" style="width:120px;">

        <button onclick="sendReply('{{row[1]}}')" 
        style="background:blue;color:white;">
            Send
        </button>

        <p style="color:green; margin-top:5px;">
            {{row[12]}}
        </p>
    </td>

    <!-- 🗑️ DELETE -->
    <td>
        <button onclick="deleteComplaint('{{row[1]}}')" 
        style="background:red;color:white;">
            Delete
        </button>
    </td>

</tr>
{% endfor %}

</table>

</div>
</div>

<!-- 🔊 SOUND -->
<audio id="alertSound" src="/static/alert.mp3"></audio>

<script>

// 💬 SEND REPLY
function sendReply(id){
    let reply = document.getElementById("reply_" + id).value;

    if(!reply){
        alert("Enter reply first");
        return;
    }

    fetch("/reply/" + id, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded"
        },
        body: "reply=" + encodeURIComponent(reply)
    })
    .then(res => res.text())
    .then(() => {
        alert("✅ Reply Sent");
        location.reload();
    });
}

// 🗑️ DELETE FUNCTION
function deleteComplaint(id){

    if(!confirm("Delete karna hai?")) return;

    fetch("/delete/" + id, {
        method: "POST"
    })
    .then(res => res.text())
    .then(() => {
        document.getElementById("row_" + id).remove();
    });
}

</script>

</body>
</html>
